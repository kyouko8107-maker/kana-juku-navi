<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かな塾長秘書AI投資ナビ｜材料株ウォッチ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#141F33;
    --ink-soft:#465066;
    --paper:#E7EBF1;
    --surface:#FFFFFF;
    --rule:#C7D1DE;
    --decline:#2A5CAA;
    --advance:#B23B3B;
    --gold:#9C7A2E;
    --gold-soft:#EFE6D2;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Zen Kaku Gothic New', sans-serif;
    line-height:1.9;
    -webkit-font-smoothing:antialiased;
  }
  header{
    background:var(--ink);
    padding:20px 20px;
  }
  header .inner{
    max-width:820px;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  header .brand{
    font-family:'Shippori Mincho', serif;
    color:#F4F5F7;
    font-size:17px;
    font-weight:700;
  }
  header .brand span{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:.1em;
    color:var(--gold);
    font-weight:700;
    margin-bottom:4px;
  }
  .page{ max-width:820px; margin:0 auto; padding:48px 20px 80px; }

  .hero h1{
    font-family:'Shippori Mincho', serif;
    font-weight:700;
    font-size:clamp(26px, 4vw, 34px);
    line-height:1.6;
    margin-bottom:14px;
  }
  .hero p{
    font-size:15px;
    color:var(--ink-soft);
    max-width:560px;
    margin-bottom:40px;
  }

  .section-label{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.12em;
    color:var(--gold);
    font-weight:700;
    margin-bottom:16px;
  }

  .list{
    display:flex;
    flex-direction:column;
    gap:2px;
    margin-bottom:48px;
  }
  .list a{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
    background:var(--surface);
    border:1px solid var(--rule);
    padding:20px 22px;
    text-decoration:none;
    color:var(--ink);
    transition:background .15s ease;
  }
  .list a:hover{ background:#F2F4F8; }
  .list .meta{
    display:flex;
    align-items:baseline;
    gap:12px;
    flex-wrap:wrap;
  }
  .list .tag{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:.05em;
    font-weight:700;
    background:var(--gold-soft);
    color:var(--gold);
    padding:3px 8px;
  }
  .list .title{
    font-family:'Shippori Mincho', serif;
    font-size:17px;
    font-weight:700;
  }
  .list .date{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .list .arrow{
    font-family:'JetBrains Mono', monospace;
    color:var(--gold);
  }

  footer{
    border-top:1px solid var(--rule);
    padding:22px 0 0;
  }
  footer p{ font-size:12px; color:#7A8397; line-height:1.9; }

  @media (max-width:520px){
    .list a{ flex-direction:column; align-items:flex-start; gap:10px; }
  }
</style>
</head>
<body>

<header>
  <div class="inner">
    <div class="brand"><span>🎯 KANA JUKUCHO SECRETARY</span>かな塾長秘書AI投資ナビ</div>
  </div>
</header>

<div class="page">

  <div class="hero">
    <h1>米国株・日本株の材料株ウォッチ</h1>
    <p>毎朝、値上がり率・出来高急増ランキングから客観的な事実だけをまとめてお届けします。特定銘柄の売買を推奨するものではありません。</p>
  </div>

  <div class="section-label">🇯🇵 日本株</div>
  <div class="list">
    <a href="jp-watch.html">
      <div class="meta">
        <span class="tag">MATERIALS WATCH</span>
        <span class="title">本日の材料株ウォッチ｜日本株</span>
      </div>
      <div class="meta">
        <span class="date" id="jp-date">読み込み中…</span>
        <span class="arrow">→</span>
      </div>
    </a>
  </div>

  <div class="section-label">🇺🇸 米国株</div>
  <div class="list">
    <a href="us-watch.html">
      <div class="meta">
        <span class="tag">MATERIALS WATCH</span>
        <span class="title">本日の材料株ウォッチ｜米国株</span>
      </div>
      <div class="meta">
        <span class="date" id="us-date">読み込み中…</span>
        <span class="arrow">→</span>
      </div>
    </a>
  </div>

  <footer>
    <p>本サイトの情報は投資勧誘ではありません。教育・参考目的のみ。投資判断はご自身の責任で行ってください。</p>
  </footer>

</div>

<script>
  // 各記事ページの「WATCHLIST / ... / 日付」表記(.eyebrow)を読み取り、
  // ホームページの日付表示に自動反映する。記事ページ側を更新するだけで、
  // ここは手動で直さなくてよい。
  async function loadDate(url, targetId){
    try{
      const res = await fetch(url);
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const eyebrow = doc.querySelector('.eyebrow');
      if(!eyebrow) throw new Error('eyebrow not found');
      const parts = eyebrow.textContent.split('/').map(s => s.trim()).filter(Boolean);
      const dateText = parts[parts.length - 1] || '';
      document.getElementById(targetId).textContent = dateText;
    }catch(e){
      document.getElementById(targetId).textContent = '最新記事を見る';
    }
  }
  loadDate('jp-watch.html', 'jp-date');
  loadDate('us-watch.html', 'us-date');
</script>
</body>
</html>
